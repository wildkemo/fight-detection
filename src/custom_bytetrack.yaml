# Custom ByteTrack configuration for 12 FPS Fight Detection
# Adapted from Ultralytics defaults: https://github.com/ultralytics/ultralytics/blob/main/ultralytics/cfg/trackers/bytetrack.yaml

tracker_type: bytetrack # (str) Tracker backend: botsort|bytetrack
track_high_thresh: 0.25 # (float) First-stage match threshold
track_low_thresh: 0.1 # (float) Second-stage threshold for low-score matches
new_track_thresh: 0.25 # (float) Start a new track if no match ≥ this
track_buffer: 36 # (int) Frames to keep lost tracks alive (3 seconds at 12 FPS)
match_thresh: 0.9 # (float) Association similarity threshold (Forgiving IoU distance for 12 FPS)
fuse_score: True # (bool) Fuse detection score with motion/IoU for matching
