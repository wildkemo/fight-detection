# ByteTrack tracker defaults for mode="track" (Refined for 12 FPS Baseline)

tracker_type: bytetrack
track_high_thresh: 0.4   # Balanced for general 12 FPS usage
track_low_thresh: 0.1
new_track_thresh: 0.4   
track_buffer: 36        # 3 seconds memory at 12 FPS
match_thresh: 0.7       # Relaxed for 12 FPS motion
fuse_score: True
